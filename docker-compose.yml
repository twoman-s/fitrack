services:
  backend_beta:
    build: .
    container_name: fitrack_backend_beta
    # Port 8000 is no longer exposed to the host — nginx is the only entry point.
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - media_data_beta:/app/media
      - static_data_beta:/app/staticfiles
    depends_on:
      - db_beta
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: fitrack_nginx_beta
    ports:
      - "45460:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data_beta:/app/media:ro
      - static_data_beta:/app/staticfiles:ro
    depends_on:
      - backend_beta
    restart: unless-stopped

  db_beta:
    image: postgres:16-alpine
    container_name: fitrack_db_beta
    environment:
      POSTGRES_DB: ${DB_NAME:-fitrack}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data_beta:/var/lib/postgresql/data
    ports:
      - "45461:5432"
    restart: unless-stopped

volumes:
  postgres_data_beta:
  media_data_beta:
  static_data_beta: