services:
  backend_beta:
    build: .
    container_name: fitrack_backend_beta
    ports:
      - "45460:8000"
    env_file:
      - .env
    volumes:
      - media_data_beta:/app/media
      - static_data_beta:/app/staticfiles
    depends_on:
      - db_beta
    restart: unless-stopped

  db_beta:
    image: postgres:16-alpine
    container_name: fitrack_db_beta
    environment:
      POSTGRES_DB: ${DB_NAME:-fitrack}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data_beta:/var/lib/postgresql/data
    ports:
      - "45461:5432"
    restart: unless-stopped

volumes:
  postgres_data_beta:
  media_data_beta:
  static_data_beta: